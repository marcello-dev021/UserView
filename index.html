<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserView — Gestão de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">User<span>View</span></div>
        <div class="header-meta">Gestão de Clientes</div>
    </header>

    <main>
        <div class="page-header">
            <div class="page-title">
                <small>Diretório</small>
                Clientes
            </div>
            <div id="contadorClientes">Carregando...</div>
        </div>

        <div class="search-row">
            <div class="search-wrapper">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="filtrar" placeholder="Buscar por nome...">
            </div>
            <button class="btn-limpar" id="btnLimpar">Limpar</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>País</th>
                        <th>Empresa</th>
                        <th>ID</th>
                    </tr>
                </thead>
                <tbody id="listaClientes">
                    <tr>
                        <td colspan="4">
                            <div class="estado">
                                <div class="spinner"></div>
                                <p>Carregando clientes...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>UserView &nbsp;·&nbsp; Dados via DevToolsDaily API</footer>

    <script type="module" src="main.js"></script>
</body>
</html>
